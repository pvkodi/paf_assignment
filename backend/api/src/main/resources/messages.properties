# Bean Validation Messages
# Used for internationalized constraint violation messages.
# Messages are loaded via ValidationConfig message source.
# Reference these messages in @Constraints using {jakarta.validation.constraints.NotBlank.message}

# ========================================
# Common Constraints
# ========================================

jakarta.validation.constraints.NotNull.message=Field cannot be null
jakarta.validation.constraints.NotBlank.message=Field cannot be blank
jakarta.validation.constraints.NotEmpty.message=Field cannot be empty
jakarta.validation.constraints.Size.message=Field length must be between {min} and {max} characters

# ========================================
# String Constraints
# ========================================

jakarta.validation.constraints.Pattern.message=Field must match pattern: {regexp}
jakarta.validation.constraints.Email.message=Field must be a valid email address
jakarta.validation.constraints.Min.message=Field value must be at least {value}
jakarta.validation.constraints.Max.message=Field value must be at most {value}
jakarta.validation.constraints.DecimalMin.message=Field value must be at least {value}
jakarta.validation.constraints.DecimalMax.message=Field value must be at most {value}

# ========================================
# Collection Constraints
# ========================================

jakarta.validation.constraints.Positive.message=Field value must be positive
jakarta.validation.constraints.PositiveOrZero.message=Field value must be positive or zero
jakarta.validation.constraints.Negative.message=Field value must be negative
jakarta.validation.constraints.NegativeOrZero.message=Field value must be negative or zero

