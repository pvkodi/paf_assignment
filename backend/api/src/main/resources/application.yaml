spring:
  application:
    name: api
  datasource:
    url: jdbc:postgresql://localhost:5432/smartcampus
    username: smartcampus
    password: smartcampus
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  jackson:
    property-naming-strategy: SNAKE_CASE

app:
  auth:
    jwt:
      secret: your-super-secret-jwt-key-change-this-in-production-at-least-32-characters-long
      expiration: 86400000 # 24 hours in milliseconds
      refresh-expiration: 604800000 # 7 days in milliseconds
    google:
      client-id: ${GOOGLE_CLIENT_ID:replace-me}
      client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
  file-storage:
    upload-dir: uploads
    max-file-size: 5242880 # 5 MB in bytes
    allowed-extensions: jpg,jpeg,png,gif,webp
    allowed-mime-types: image/jpeg,image/png,image/gif,image/webp
    thumbnail-dimensions: 200x200
  time-policy:
    campus-timezone: Asia/Colombo # DST-aware campus timezone
    peak-hour-start: "08:00" # Peak hour restriction start
    peak-hour-end: "10:00" # Peak hour restriction end
    no-show-grace-minutes: 15 # 15 minutes from booking start to classify as no-show
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@smartcampus.local}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false
          debug: false
  booking:
    high-capacity-threshold: 200 # Facilities with capacity > 200 require additional approval

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:8080
