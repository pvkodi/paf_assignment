name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ============================================================================
  # BACKEND: Build & Compile Validation
  # ============================================================================
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compile backend
        run: ./mvnw -B -DskipTests clean compile

      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: backend-classes
          path: backend/api/target/classes
          retention-days: 1

  # ============================================================================
  # BACKEND TESTS: Unit Tests (Fast feedback - runs early)
  # ============================================================================
  backend-unit-tests:
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: backend/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Download compiled classes
        uses: actions/download-artifact@v4
        with:
          name: backend-classes
          path: backend/api/target/classes

      - name: Run unit tests
        run: ./mvnw -B test -Dtest=**/*Test.java -DfailIfNoTests=false

      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/api/target/surefire-reports/*.xml
          check_name: Backend Unit Test Results

  # ============================================================================
  # BACKEND TESTS: Contract Tests (API Contract Validation)
  # ============================================================================
  backend-contract-tests:
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: backend/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Set up Docker (for services)
        uses: docker/setup-buildx-action@v3

      - name: Download compiled classes
        uses: actions/download-artifact@v4
        with:
          name: backend-classes
          path: backend/api/target/classes

      - name: Run contract tests
        run: ./mvnw -B test -Dtest=**/*ContractTest.java -DfailIfNoTests=false

      - name: Publish contract test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/api/target/surefire-reports/*ContractTest*.xml
          check_name: Backend Contract Test Results

  # ============================================================================
  # BACKEND TESTS: Integration Tests (Full system validation)
  # ============================================================================
  backend-integration-tests:
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: backend/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sliit_reserve_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Download compiled classes
        uses: actions/download-artifact@v4
        with:
          name: backend-classes
          path: backend/api/target/classes

      - name: Run integration tests
        run: ./mvnw -B test -Dtest=**/*IntegrationTest.java -DfailIfNoTests=false
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sliit_reserve_test
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_password
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      - name: Publish integration test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/api/target/surefire-reports/*IntegrationTest*.xml
          check_name: Backend Integration Test Results

  # ============================================================================
  # FRONTEND: Linting & Code Quality
  # ============================================================================
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src --max-warnings 0 --report-unused-disable-directives
        continue-on-error: true

  # ============================================================================
  # FRONTEND: Build & Testing
  # ============================================================================
  frontend-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test --if-present
        continue-on-error: true

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 1

  # ============================================================================
  # CI STATUS: Overall pipeline validation
  # ============================================================================
  ci-status:
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - backend-unit-tests
      - backend-contract-tests
      - backend-integration-tests
      - frontend-lint
      - frontend-build-test
    if: always()
    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.backend-build.result }}" != "success" ]] || \
             [[ "${{ needs.backend-unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.backend-contract-tests.result }}" != "success" ]] || \
             [[ "${{ needs.backend-integration-tests.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-build-test.result }}" != "success" ]]; then
            echo "❌ CI pipeline failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
