name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ============================================================================
  # BACKEND: Build & Compile Validation
  # ============================================================================
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compile backend
        run: ./mvnw -B -DskipTests clean compile

      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: backend-classes
          path: backend/api/target/classes
          retention-days: 1

  # ============================================================================
  # FRONTEND: Linting & Code Quality
  # ============================================================================
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src --max-warnings 0 --report-unused-disable-directives
        continue-on-error: true
